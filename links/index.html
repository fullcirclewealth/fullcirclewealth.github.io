!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Circle Wealth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .fcw-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 26px;
      color: #ffffff;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 6px;
    }

    .fcw-tagline {
      font-size: 13px;
      color: #888;
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
      font-weight: 400;
    }

    .fcw-links {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 400px;
    }

    .fcw-link {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 22px;
      border-radius: 14px;
      text-decoration: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .fcw-link:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .fcw-link:active {
      transform: scale(0.98);
    }

    .fcw-link.primary {
      background: #c8f542;
    }

    .fcw-link.secondary {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
    }

    .fcw-link-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .primary .fcw-link-icon { background: rgba(0,0,0,0.15); }
    .secondary .fcw-link-icon { background: #2a2a2a; }

    .fcw-link-text { flex: 1; }

    .fcw-link-label {
      font-weight: 700;
      font-size: 15px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .primary .fcw-link-label { color: #0a0a0a; }
    .secondary .fcw-link-label { color: #ffffff; }

    .fcw-link-sub {
      font-size: 12px;
      font-weight: 400;
      display: block;
      margin-top: 2px;
      letter-spacing: 0.01em;
    }

    .primary .fcw-link-sub { color: rgba(0,0,0,0.55); }
    .secondary .fcw-link-sub { color: #666; }

    .fcw-link-arrow { font-size: 16px; flex-shrink: 0; }
    .primary .fcw-link-arrow { color: rgba(0,0,0,0.4); }
    .secondary .fcw-link-arrow { color: #444; }

    .fcw-footer {
      margin-top: 44px;
      font-size: 11px;
      color: #3a3a3a;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
